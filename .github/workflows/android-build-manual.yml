name: android-build-manual

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" "cmake;3.22.1" "ndk;27.2.12479018"

      - name: Validate Android and native toolchain dependencies
        run: |
          set -euo pipefail
          required_tools=(java javac sdkmanager cmake ninja make python3)
          for tool in "${required_tools[@]}"; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "Missing required tool: $tool" >&2
              exit 1
            fi
            echo "OK: $tool -> $(command -v "$tool")"
          done

      - name: Verify Gradle baseline
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon verifyGradleRuntimeJvm verifyTargetApiBaseline verifyMinApiAbiCompatibility verifyArm64ToolchainCompatibility verifyBootstrapAssets verifyRepoFileDependencies

      - name: Lint + Assemble app debug
        run: ./gradlew --no-daemon lintDebug :app:assembleDebug -PcheckVariant=debug --stacktrace

      - name: Run native matrix (reduced)
        run: ./gradlew --no-daemon checkNativeAllMatrix -PbuildStrict=false --stacktrace

      - name: Upload APK and Gradle reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-manual-artifacts
          path: |
            app/build/outputs/apk/**/*.apk
            **/build/reports/**
            **/build/test-results/**
          if-no-files-found: warn
