name: Android CI (Debug)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components (platforms/build-tools/ndk/cmake)
        run: |
          sdkmanager --version
          yes | sdkmanager --licenses

          # Ajuste aqui se seu projeto usar outro compileSdk/buildTools
          sdkmanager "platform-tools" \
                     "platforms;android-35" \
                     "build-tools;35.0.0" \
                     "cmdline-tools;latest" \
                     "ndk;25.2.9519653" \
                     "cmake;3.22.1"

          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Gradle permissions
        run: chmod +x ./gradlew

      - name: Print environment
        run: |
          java -version
          ./gradlew -v
          echo "SDK=$ANDROID_SDK_ROOT"
          echo "NDK=$ANDROID_NDK_HOME"
          ls -la

      - name: Clean (hard)
        run: |
          ./gradlew --stop || true
          ./gradlew clean --no-daemon

      - name: Assemble Debug (with full logs)
        run: |
          ./gradlew :app:assembleDebug \
            --stacktrace --info --no-daemon

      - name: Upload APK(s)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apk-debug
          path: |
            **/build/outputs/apk/debug/*.apk
            **/build/outputs/**/*.apk
