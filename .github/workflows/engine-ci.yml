name: Engine CI

on:
  push:
    paths:
      - 'engine/**'
      - 'bench/**'
      - 'demo_cli/**'
      - 'Makefile'
      - 'CMakeLists.txt'
      - '.github/workflows/engine-ci.yml'
  pull_request:
    paths:
      - 'engine/**'
      - 'bench/**'
      - 'demo_cli/**'
      - 'Makefile'
      - 'CMakeLists.txt'
      - '.github/workflows/engine-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: engine-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine-build-bench:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Block sensitive artifacts in repository (warn only)
        continue-on-error: true
        run: bash tools/security/block_sensitive_artifacts.sh

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential cmake make graphviz

      - name: Prepare output directories
        run: |
          mkdir -p bench/results
          mkdir -p reports/baremetal

      - name: Build with Make
        run: make clean && make all

      - name: Build with CMake
        run: |
          cmake -S . -B build-cmake
          cmake --build build-cmake -j"$(nproc)"

      - name: Run BitΩ smoke test (Make)
        run: make run-bitomega-smoketest

      - name: Run BitΩ smoke test (CMake)
        run: cmake --build build-cmake --target run_bitomega_smoketest

      - name: Generate BitΩ transition graph
        run: |
          mkdir -p reports
          python3 tools/bitomega_csv_to_dot.py \
            bench/results/bitomega_transitions.csv \
            reports/bitomega_transition_graph.dot \
            reports/bitomega_summary.md
          dot -Tpng reports/bitomega_transition_graph.dot -o reports/bitomega_transition_graph.png

      - name: Run release gate (selftest + bench + summary)
        run: make run-release-gate

      - name: Upload BitΩ smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bitomega-artifacts
          path: |
            bench/results/bitomega_transitions.csv
            reports/bitomega_transition_graph.png
            reports/bitomega_summary.md
          if-no-files-found: warn

      - name: Upload bench summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-summary
          path: bench/results/summary.json
          if-no-files-found: warn

      - name: Upload baremetal reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: baremetal-reports
          path: reports/baremetal/*
          if-no-files-found: warn
